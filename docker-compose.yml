version: '3.9'
services:
  backend:
    build: ./backend
    ports: [ "8000:8000" ]
    env_file: .env
    volumes:
      - ./models_saved:/app/models_saved
      - ./datasets:/app/datasets
    depends_on: [ redis ]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    env_file: .env
    volumes:
      - ./models_saved:/app/models_saved
      - ./datasets:/app/datasets
    depends_on: [ redis ]
    command: celery -A tasks.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build: ./frontend
    ports: [ "5173:5173" ]
    env_file: .env
    depends_on: [ backend ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
